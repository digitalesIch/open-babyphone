<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Open Babyphone social sharing image</title>
  <desc id="desc">A dark gradient Open Babyphone preview with a baby monitor, phone cards, and sound waves.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b12"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#080b12"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ff2d2"/>
      <stop offset="1" stop-color="#5da8ff"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb076"/>
      <stop offset="1" stop-color="#ff6fae"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="156" cy="116" r="210" fill="#5ff2d2" opacity="0.14" filter="url(#soft)"/>
  <circle cx="1042" cy="72" r="230" fill="#ff6fae" opacity="0.16" filter="url(#soft)"/>
  <circle cx="1012" cy="555" r="250" fill="#5da8ff" opacity="0.16" filter="url(#soft)"/>

  <path d="M760 106c86-58 212-44 284 32 77 81 69 209-17 287" fill="none" stroke="#5da8ff" stroke-width="4" opacity="0.24"/>
  <path d="M760 458c34-50 70-50 104 0s70 50 104 0 70-50 104 0" fill="none" stroke="#5ff2d2" stroke-width="7" stroke-linecap="round" opacity="0.48"/>

  <g transform="translate(92 126)" filter="url(#shadow)">
    <rect x="42" y="72" width="278" height="174" rx="42" fill="#ffffff"/>
    <rect x="88" y="32" width="34" height="84" rx="17" fill="#ffffff"/>
    <rect x="232" y="32" width="34" height="84" rx="17" fill="#ffffff"/>
    <rect x="124" y="234" width="28" height="42" rx="14" fill="#ffffff"/>
    <rect x="172" y="234" width="28" height="42" rx="14" fill="#ffffff"/>
    <rect x="220" y="234" width="28" height="42" rx="14" fill="#ffffff"/>
    <rect x="100" y="310" width="170" height="27" rx="13.5" fill="#ffffff"/>
    <path d="M338 98c16 34 16 86 0 120" fill="none" stroke="#5da8ff" stroke-width="11" stroke-linecap="round" opacity="0.86"/>
    <path d="M374 78c24 56 24 122 0 178" fill="none" stroke="#5da8ff" stroke-width="12" stroke-linecap="round" opacity="0.78"/>
    <path d="M414 54c34 78 34 168 0 246" fill="none" stroke="#5da8ff" stroke-width="13" stroke-linecap="round" opacity="0.7"/>
  </g>

  <g transform="translate(898 402) scale(0.58)" opacity="0.58">
    <rect x="0" y="0" width="142" height="242" rx="26" fill="rgba(255,255,255,0.06)" stroke="url(#brand)" stroke-width="6"/>
    <rect x="28" y="34" width="86" height="132" rx="16" fill="rgba(95,242,210,0.09)"/>
    <circle cx="71" cy="203" r="13" fill="url(#brand)"/>
    <path d="M180 66q22-30 44 0t44 0 44 0" fill="none" stroke="url(#brand)" stroke-width="8" stroke-linecap="round" opacity="0.92"/>
    <path d="M180 118q22-30 44 0t44 0 44 0" fill="none" stroke="url(#brand)" stroke-width="8" stroke-linecap="round" opacity="0.68"/>
    <path d="M180 170q22-30 44 0t44 0 44 0" fill="none" stroke="url(#brand)" stroke-width="8" stroke-linecap="round" opacity="0.44"/>
  </g>

  <g transform="translate(484 146)">
    <text x="0" y="0" fill="#f6f7fb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="74" font-weight="800" letter-spacing="-2">Open Babyphone</text>
    <text x="2" y="80" fill="#f6f7fb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="600" letter-spacing="-0.5">Local audio monitoring</text>
    <text x="3" y="136" fill="#a5b2c8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="31" font-weight="500">Same Wi-Fi. No cloud. No accounts.</text>

    <g transform="translate(4 200)">
      <rect x="0" y="0" width="178" height="44" rx="22" fill="rgba(95,242,210,0.12)" stroke="rgba(95,242,210,0.38)"/>
      <circle cx="24" cy="22" r="7" fill="#5ff2d2"/>
      <text x="44" y="29" fill="#f6f7fb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">Open source</text>

      <rect x="198" y="0" width="152" height="44" rx="22" fill="rgba(93,168,255,0.12)" stroke="rgba(93,168,255,0.38)"/>
      <circle cx="222" cy="22" r="7" fill="#5da8ff"/>
      <text x="242" y="29" fill="#f6f7fb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">Android</text>

      <rect x="370" y="0" width="160" height="44" rx="22" fill="rgba(255,111,174,0.12)" stroke="rgba(255,111,174,0.38)"/>
      <circle cx="394" cy="22" r="7" fill="#ff6fae"/>
      <text x="414" y="29" fill="#f6f7fb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">Local first</text>
    </g>
  </g>

  <rect x="56" y="54" width="1088" height="522" rx="46" fill="none" stroke="rgba(255,255,255,0.1)"/>
  <path d="M64 566h1072" stroke="url(#pink)" stroke-width="3" opacity="0.34"/>
